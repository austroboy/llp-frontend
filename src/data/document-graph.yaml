# LLP Universe — Document Relationship Graph
# Used for retrieval routing and document prioritization.
# NOT embedded in vector store — loaded as structured data at query time.
#
# When a query mentions a section number, the graph tells the system:
# 1. Which document family to search first (Act vs Rules)
# 2. Which amendments modified that section
# 3. Priority order for results

# ── Document Families ─────────────────────────────────────────────

families:
  labour_act:
    name: "Bangladesh Labour Act Family"
    description: "The parent Labour Act 2006 and all its amendments"
    parent: "DOC-010"  # Labour Act 2006 (in DB as DOC-010)
    registry_id: "DOC-001"  # In universe-registry.json
    amendments:
      - "DOC-002"  # 2009 Amendment
      - "DOC-003"  # 2010 Amendment
      - "DOC-004"  # 2013 Amendment
      - "DOC-005"  # 2018 Amendment
      - "DOC-006"  # 2025 Ordinance
    # When searching for Act sections, prioritize in this order:
    search_priority: ["DOC-010", "DOC-006", "DOC-004", "DOC-005", "DOC-002", "DOC-003"]
    section_range: "1-355"  # Act has sections 1-355
    
  labour_rules:
    name: "Bangladesh Labour Rules Family"
    description: "The Labour Rules 2015 implementing the Act, and amendments"
    parent: "DOC-007"  # Labour Rules 2015
    amendments:
      - "DOC-008"  # 2022 Amendment
    search_priority: ["DOC-007", "DOC-008"]
    section_range: "1-350"  # Rules have rules 1-350
    # Rules sections are prefixed "Rule" not "Section" in the original
    # but in our chunks they're stored as "Section X"
    
  standards:
    name: "International Standards"
    parent: "DOC-009"  # SA8000
    amendments: []
    search_priority: ["DOC-009"]

# ── Document Details ──────────────────────────────────────────────

