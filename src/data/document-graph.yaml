# ── Retrieval Routing Rules ───────────────────────────────────────

routing_rules:
  # When query mentions "Act" or is about core labour law topics:
  # → Search labour_act family first, then rules
  act_priority_keywords:
    - "act"
    - "আইন"
    - "terminate"
    - "dismissal"
    - "retrenchment"
    - "ছাঁটাই"
    - "provident fund"
    - "maternity"
    - "মাতৃত্ব"
    - "wages"
    - "মজুরী"
    - "leave"
    - "ছুটি"
    - "working hours"
    - "কর্মঘন্টা"
    - "trade union"
    - "labour court"
    - "শ্রম আদালত"
    - "compensation"
    - "ক্ষতিপূরণ"
    - "retirement"
    - "অবসর"
    - "minimum age"
    - "safety"

  # When query mentions "Rules" or is about procedural/form topics:
  # → Search labour_rules family first, then act
  rules_priority_keywords:
    - "rules"
    - "বিধি"
    - "form"
    - "ফরম"
    - "procedure"
    - "license"
    - "registration"
    - "inspection"
    - "schedule"
    - "তফসিল"

  # Default: search Act family first (most queries are about the Act)
  default_family: "labour_act"
